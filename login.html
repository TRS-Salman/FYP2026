<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Heart Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --teal: #14B8A6; --dark: #1E1B4B; --bg: #F8FAFC; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(30, 27, 75, 0.1); overflow: hidden; max-width: 900px; width: 100%; display: flex; }
        .auth-info { background: var(--dark); color: white; padding: 60px; width: 45%; display: flex; flex-direction: column; justify-content: center; }
        .auth-form { padding: 60px; width: 55%; }
        .btn-teal { background: var(--teal); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-teal:hover { background: #0D9488; transform: translateY(-2px); }
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-info d-none d-md-flex">
            <h2 class="fw-bold mb-4">AI Heart Guard</h2>
            <p class="opacity-75">Accessing the Intelligence Layer for real-time heart disease risk assessments.</p>
            <ul class="list-unstyled mt-4 small">
                <li class="mb-2">✓ ML-Powered Diagnostics</li>
                <li class="mb-2">✓ Clinical Support System</li>
            </ul>
        </div>
        <div class="auth-form">
            <h3 class="fw-bold mb-2">Welcome Back</h3>
            <p class="text-muted mb-4 small">Enter your credentials to access your dashboard.</p>
            <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
    
        <button type="submit" class="btn btn-teal w-100 mb-3">Authorize & Login</button>
    </form>
            <div class="text-center">
                <p class="small mb-0">New User? <a href="{{ url_for('register') }}" class="text-teal text-decoration-none fw-bold">Create Account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
