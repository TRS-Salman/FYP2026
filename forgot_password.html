<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Access | AI Heart Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --teal: #14B8A6; --dark: #1E1B4B; --bg: #F8FAFC; }
        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .recovery-card { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(30, 27, 75, 0.08); 
            padding: 50px; 
            width: 100%; 
            max-width: 480px; 
            text-align: center;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #F1F5F9;
            color: var(--teal);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 24px;
        }
        .btn-teal { 
            background: var(--teal); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: 0.3s ease;
        }
        .btn-teal:hover { 
            background: #0D9488; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(20, 184, 166, 0.3);
        }
        .form-control { 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #E2E8F0; 
            text-align: center;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
        }
        .back-link {
            color: #64748B;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .back-link:hover { color: var(--dark); }
    </style>
</head>
<body>
    <div class="recovery-card">
        <div class="icon-box">🔑</div>
        <h3 class="fw-bold mb-2" style="color: var(--dark);">Reset Access</h3>
        <p class="text-muted mb-4 px-3">Enter your verified <strong>User ID</strong> or registered email to receive a secure reset link.</p>
        
        <form onsubmit="event.preventDefault(); alert('Reset link sent to your registered clinical email.');">
            <div class="mb-4">
                <input type="text" class="form-control" placeholder="ID-0000 or Email" required>
            </div>
            
            <button type="submit" class="btn btn-teal w-100 mb-4">Request Recovery Link</button>
        </form>

        <div class="border-top pt-4">
            <a href="login.html" class="back-link fw-medium">
                <span class="me-1">←</span> Return to Login
            </a>
        </div>
        
        <div class="mt-4 pt-2">
            <small class="text-uppercase ls-wide" style="font-size: 0.65rem; color: #CBD5E1; letter-spacing: 1px;">
                Internal Support System
            </small>
        </div>
    </div>
</body>
</html>
