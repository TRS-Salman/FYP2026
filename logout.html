<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Out | AI Heart Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --teal: #14B8A6; --dark: #1E1B4B; }
        body { 
            background-color: var(--dark); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .logout-container { text-align: center; animation: fadeIn 1s ease-in; }
        .heart-icon { font-size: 4rem; color: var(--teal); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--teal);
            animation: load 3s forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>

    <div class="logout-container">
        <div class="heart-icon">❤️</div>
        <h2 class="fw-bold mt-3">Thank You for Using AI Heart Guard</h2>
        <p class="opacity-75">Securely closing your clinical session...</p>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        
        <p class="small text-muted mt-3">Redirecting to Google Search...</p>
    </div>

    <script>
        // Wait 3.5 seconds to show the thanks message, then redirect to Google
        setTimeout(function() {
            window.location.href = "https://www.google.com";
        }, 3500);
    </script>

</body>
</html>
