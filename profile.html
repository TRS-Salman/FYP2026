<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | AI Heart Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --teal: #14B8A6; --dark: #1E1B4B; --bg: #F8FAFC; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .profile-header { background: var(--dark); color: white; padding: 60px 0; border-radius: 0 0 40px 40px; }
        .avatar-circle { width: 120px; height: 120px; background: var(--teal); border: 5px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-top: -60px; z-index: 10; position: relative; }
        .card-custom { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .badge-clinical { background: rgba(20, 184, 166, 0.1); color: var(--teal); border: 1px solid var(--teal); }
        .edit-field { display: none; } /* Hidden by default */
    </style>
</head>
<body>

    <div class="profile-header text-center">
        <h2 class="fw-bold">User Profile</h2>
        <p class="opacity-75">Member since ...</p>
    </div>
    
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-5">
                    <div class="avatar-circle mx-auto">👨‍⚕️</div>
                    <h3 class="mt-3 fw-bold" style="color: var(--dark);" id="display-name"><p>{{ session['username'] }}</p></h3>
                    <span class="badge badge-clinical px-3 py-2">Web Application User</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-7">
                        <div class="card card-custom p-4 h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Identity Details</h5>
                                <button class="btn btn-sm btn-outline-teal" id="edit-btn" onclick="toggleEdit()">✏️ Edit Info</button>
                            </div>
                            
                            <div class="mb-3">
                                <label class="text-muted small d-block">Full Name</label>
                                <span class="fw-medium view-mode" id="val-name"><p>{{ session['username'] }}</p></span>
                                
                            </div>

                            <div class="mb-3">
                                <label class="text-muted small d-block"> Email</label>
                                <span class="fw-medium view-mode" id="val-email"><p>{{ session['email'] }}</p></span>
                                
                            </div>

                            <div class="mb-3">
                                <label class="text-muted small d-block">Assigned ID</label>
                                <code class="text-teal fw-bold view-mode" id="val-id"><p>{{ session['user_id'] }}</p></code>
                                
                            </div>

                            <div class="edit-field mt-3">
                                <button class="btn btn-teal w-100" onclick="saveChanges()">Save Changes</button>
                                <button class="btn btn-link w-100 text-muted small" onclick="toggleEdit()">Cancel</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="card card-custom p-4 h-100 bg-white">
                            <h5 class="fw-bold mb-4">Activity Overview</h5>
                            <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
                                <span class="text-muted">Total Predictions</span>
                                <span class="fw-bold text-teal">...</span>
                            </div>
        
                            <div class="d-flex justify-content-between">
                                <span class="text-muted">Last Activity</span>
                                <span class="fw-bold text-teal">...</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-5">
                    <a href="{{ url_for('home') }}" class="btn btn-outline-secondary px-4">Back to Dashboard</a>
                </div>
                <div>
                <li class="nav-item mt-5">
                        <a class="nav-link text-danger fw-bold" href="{{ url_for('logout') }}">
                        🚪 Secure Logout
                        </a>
                </li>
                </div>               
            </div>
        </div>
    </div>

    <script>
        function toggleEdit() {
            const views = document.querySelectorAll('.view-mode');
            const edits = document.querySelectorAll('.edit-field');
            const btn = document.getElementById('edit-btn');

            if (edits[0].style.display === 'none' || edits[0].style.display === '') {
                views.forEach(v => v.style.display = 'none');
                edits.forEach(e => e.style.display = 'block');
                btn.style.display = 'none';
            } else {
                views.forEach(v => v.style.display = 'block');
                edits.forEach(e => e.style.display = 'none');
                btn.style.display = 'block';
            }
        }

        function saveChanges() {
            // Transfer input values to display spans
            document.getElementById('val-name').innerText = document.getElementById('input-name').value;
            document.getElementById('display-name').innerText = document.getElementById('input-name').value;
            document.getElementById('val-email').innerText = document.getElementById('input-email').value;
            document.getElementById('val-id').innerText = document.getElementById('input-id').value;
            
            alert('Clinical profile updated successfully!');
            toggleEdit();
        }
    </script>
</body>
</html>
